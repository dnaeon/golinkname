name: Check Emacs Integration
on:
  push:
    branches-ignore:
      - 'renovate/**'
      - 'dependabot/**'
    paths:
      - 'editor/emacs/**'
      - '.github/workflows/check-emacs.yaml'
  pull_request:
    paths:
      - 'editor/emacs/**'
      - '.github/workflows/check-emacs.yaml'

permissions:
  contents: read

jobs:
  ert:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs-version:
          - '29.4'
          - '30.1'
    steps:
      - uses: actions/checkout@v6
      - uses: purcell/setup-emacs@v8.0
        with:
          version: ${{ matrix.emacs-version }}
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true
      - name: Build golinkname binary
        run: |
          set -eu
          make build
          echo "GOLINKNAME_BIN=${GITHUB_WORKSPACE}/bin/golinkname" >> "${GITHUB_ENV}"
      - name: Byte-compile golinkname.el
        working-directory: editor/emacs
        run: |
          set -eu
          emacs -Q --batch \
            --eval "(setq byte-compile-error-on-warn t)" \
            -f batch-byte-compile golinkname.el
      - name: Run ert tests
        working-directory: editor/emacs
        run: |
          set -eu
          emacs -Q --batch \
            -L . \
            -l golinkname-tests.el \
            -f ert-run-tests-batch-and-exit
